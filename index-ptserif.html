<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alexa & Richard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Rufina:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Rufina',serif;color:#5a5247;
    background:linear-gradient(180deg,#fffdfb 0%,#f3f1ec 45%,#e7ecf0 100%);
    min-height:100svh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:40px 22px;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative;
  }
  /* soft floating accents */
  body::before,body::after{content:"";position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  body::before{width:46vmax;height:46vmax;top:-18vmax;left:-16vmax;background:radial-gradient(circle,rgba(199,214,224,.5),transparent 68%);}
  body::after{width:42vmax;height:42vmax;bottom:-18vmax;right:-14vmax;background:radial-gradient(circle,rgba(232,224,210,.55),transparent 68%);}
  .card{position:relative;z-index:1;max-width:540px;width:100%;margin:0 auto;}
  .names{font-family:'Imperial Script',cursive;color:#7f8a93;font-size:clamp(46px,12vw,92px);line-height:1.12;margin-bottom:6px;max-width:100%;overflow-wrap:break-word;}
  .orn{color:#b9a98a;letter-spacing:.5em;font-size:18px;margin:10px 0 26px;}
  .lead{font-size:clamp(17px,3.4vw,22px);letter-spacing:.04em;color:#6f6657;margin-bottom:30px;}
  .lead .sub{display:block;font-size:.8em;color:#9a8f7d;margin-top:4px;}
  .langs{display:flex;flex-direction:column;gap:16px;align-items:center;}
  .lang{display:block;width:min(340px,86vw);font-family:'Rufina',serif;font-size:clamp(18px,4vw,23px);
    letter-spacing:.06em;color:#4f5a62;text-decoration:none;
    background:rgba(255,255,255,.7);border:1px solid #c8d2da;border-radius:999px;padding:16px 24px;
    transition:all .25s ease;box-shadow:0 12px 26px -16px rgba(90,90,110,.5);}
  .lang small{display:block;font-size:.62em;letter-spacing:.18em;color:#9aa6ad;margin-top:3px;text-transform:uppercase;}
  .lang:hover{background:#8ea7b6;border-color:#8ea7b6;color:#fff;transform:translateY(-2px);}
  .lang:hover small{color:rgba(255,255,255,.85);}
</style>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&display=swap" rel="stylesheet"><style>.lang,.lead{font-family:'PT Serif',serif!important;}</style></head>
<body>
  <div class="card">
    <div class="names">Bek &amp; Sofya</div>
    <div class="orn">✦ ✦ ✦</div>
    <p class="lead">Тилди тандаңыз<span class="sub">Тілді таңдаңыз</span></p>
    <div class="langs">
      <a class="lang" href="kg-ptserif.html">Кыргызча<small>Кыргыз тили</small></a>
      <a class="lang" href="kz-ptserif.html">Қазақша<small>Қазақ тілі</small></a>
    </div>
  </div>
</body>
</html>

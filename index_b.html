  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'PT Serif',serif;color:#5a5247;
    background:linear-gradient(180deg,#fffdfb 0%,#f3f1ec 45%,#e7ecf0 100%);
    min-height:100svh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:40px 22px;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative;
  }
  /* soft floating accents */
  body::before,body::after{content:"";position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  body::before{width:46vmax;height:46vmax;top:-18vmax;left:-16vmax;background:radial-gradient(circle,rgba(199,214,224,.5),transparent 68%);}
  body::after{width:42vmax;height:42vmax;bottom:-18vmax;right:-14vmax;background:radial-gradient(circle,rgba(232,224,210,.55),transparent 68%);}
  .card{position:relative;z-index:1;max-width:540px;width:100%;margin:0 auto;}
  .names{font-family:'Florisel','PT Serif',cursive;color:#7f8a93;font-size:clamp(40px,9.5vw,92px);line-height:1.1;margin-bottom:10px;max-width:100%;padding:0 6px;overflow-wrap:break-word;}
  .orn{color:#b9a98a;letter-spacing:.5em;font-size:18px;margin:10px 0 26px;}
  .lead{font-size:clamp(24px,6vw,38px);letter-spacing:.04em;color:#1a1a1a;margin-bottom:46px;font-weight:700;}
  .invtitle{margin-bottom:42px}
  .invtitle .t1{display:block;font-size:clamp(17px,4.6vw,24px);letter-spacing:.14em;font-weight:700;color:#1a1a1a}
  .invtitle .t2{display:block;font-family:'Florisel','PT Serif',cursive;font-size:clamp(44px,12vw,68px);color:#1a1a1a;line-height:1;margin-top:4px}
  .lead .sub{display:block;font-size:.66em;color:#3a3a3a;margin-top:8px;font-weight:400;}
  .langs{display:flex;flex-direction:column;gap:22px;align-items:center;}
  .lang{display:block;width:min(400px,90vw);font-family:'PT Serif',serif;font-size:clamp(24px,5.6vw,30px);
    letter-spacing:.06em;color:#1a1a1a;text-decoration:none;
    background:rgba(255,255,255,.7);border:1px solid #c8d2da;border-radius:999px;padding:24px 28px;
    transition:all .25s ease;box-shadow:0 12px 26px -16px rgba(90,90,110,.5);}
  .lang small{display:block;font-size:.6em;letter-spacing:.18em;color:#555;margin-top:5px;text-transform:uppercase;}
  .lang:hover{background:#8ea7b6;border-color:#8ea7b6;color:#fff;transform:translateY(-2px);}
  .lang:hover small{color:rgba(255,255,255,.85);}

<script>
/* always load a FRESH kg.html/kz.html (bust browser cache) so opening never shows a stale/broken build */

</script>
